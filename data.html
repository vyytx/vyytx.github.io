<html>
  <head>
    <title>The database</title>
    <link href="css/bootstrap.css" rel="stylesheet">
    <script src="js/fdb-all.min.js"></script>
    <script src="https://code.jquery.com/jquery-2.1.4.js"></script>
    </head>
  <body>
      <table class="table table-hover">
          <thead>
            <tr>
               <td> id </td>
               <td> name </td>
               <td> mail</td>
               <td> age </td>
               <td> _id </td>
            </tr>
          </thead>
        <tbody class="TInsert">
          
        </tbody>
    </table>
    
      <script>
      var fdb = new ForerunnerDB();
      var db = fdb.db("the database");
      var random = 0;
      var random1 = 0;
      var i = 0;
      var id = 1;
      var st;
      var sti = 0;
      mainCollection = db.collection('main');
      __do();
      function _do (times){ 
        while (i != times){
          random = Math.random();
          random1 = Math.random();
          mainCollection.insert({
            name: random + "",
            age: random1,
            e_mail: random + "@mail.com",
            id: id
          });
          $( ".TInsert" ).append( $( "<tr><td>" + id + "</td><td>" + random + "</td><td>" + random + "@mail.com" + "</td><td>" + random1 + "</td></tr>" ) );
          i = i + 1;
          id = id + 1;
        }
        i = 0;
      }
      function __do () {
        mainCollection.load();
        mainCollection.find();
        st = mainCollection.find();
        while (mainCollection.find().length != sti){
          $( ".TInsert" ).append( $( "<tr><td>" + st[sti].id + "</td><td>" + st[sti].name + "</td><td>" + st[sti]["e_mail"] + "</td><td>" + st[sti].age + "</td><td class='__id'>" + st[sti]._id + "</td></tr>" ) );
          sti = sti + 1;
        }
        sti = 0;
        $(".__id").click(function() {
          var q = {_id:$( this ).text()};
          console.log(mainCollection.find(q)[0]);
        });
      }
      $(".__id").click(function() {
        var q = {_id:$( this ).text()};
        alert(mainCollection.find(q));
      });
      </script>
    </body>
  </html>
