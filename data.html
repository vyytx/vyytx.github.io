<html>
  <head>
    <title>The database</title>
    </head>
  <body>
    <script src="http://orangeappletw.github.io/JavaScript-Advanced-textbook/database_-_part_1/js/fdb-all.min.js"></script>
    <script>
      var fdb = new ForerunnerDB();
      var db = fdb.db("the database");
      var random = 0;
      var random1 = 0;
      var i = 0;
      mainCollection = db.collection('main');
      function _do (times){ 
        while (i != times){
          random = Math.random();
          random1 = Math.random();
          mainCollection.insert({
            name: random,
            age: random1,
            e-mail: random + "@mail.com"
          });
          i = i + 1;
        }
        i = 0;
      }
      </script>
    </body>
  </html>
