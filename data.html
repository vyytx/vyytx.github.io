<html>
  <head>
    <title>The database</title>
    <link href="css/bootstrap.css" rel="stylesheet">
    <script src="js/fdb-all.min.js"></script>
    <script src="https://code.jquery.com/jquery-2.1.4.js"></script>
    <script src="js/bootstrap.js"></script>
    </head>
  <body>
      <table class="table table-hover">
          <thead>
            <tr>
               <td> id </td>
               <td> name </td>
               <td> mail</td>
               <td> age </td>
               <td> _id </td>
            </tr>
          </thead>
        <tbody class="TInsert">
          
        </tbody>
    </table>
    
      <script>
      var fdb = new ForerunnerDB();
      var db = fdb.db("the database");
      var random = 0;
      var random1 = 0;
      var i = 0;
      var id = 1;
      var st;
      var sti = 0;
      var stID;
      mainCollection = db.collection('main');
      __do();
      function _do (times){ 
        while (i != times){
          random = Math.random();
          random1 = Math.random();
          //mainCollection.insert({
           // name: random + "",
            //age: random1,
           // e_mail: random + "@mail.com",
           // id: id
          //});
          $( ".TInsert" ).append( $( "<tr><td>" + id + "</td><td>" + random + "</td><td>" + random + "@mail.com" + "</td><td>" + random1 + "</td></tr>" ) );
          i = i + 1;
          id = id + 1;
        }
        i = 0;
      }
      function __do () {
        mainCollection.load();
        mainCollection.find();
        st = mainCollection.find();
        while (mainCollection.find().length != sti){
          $( ".TInsert" ).append( $( "<tr><td>" + st[sti].id + "</td><td><span>" + st[sti].name + "  " + "</span><button type='button' class='btn btn-primary btn-lg js-edit-btn' data-toggle='modal' data-target='eeedit' class= 'edit-btn'>  修改 </button> </td><td>" + st[sti]["e_mail"] + "</td><td>" + st[sti].age + "</td><td class='__id'>" + st[sti]._id + "</td></tr>" ) );
          sti = sti + 1;
        }
        sti = 0;
        $(".__id").click(function() {
          var q = {_id:$( this ).text()};
          console.log(mainCollection.find(q)[0]);
        });
      }
      $(".__id").click(function() {
        var q = {_id:$( this ).text()};
        alert(mainCollection.find(q));
      });
      
      $(".edit-btn").click(function(){
        var stData = mainCollection.find({_id:$(this).data("id")});
        stData = stData[0];
        stID = $(this).data("id");
        $("nameIn").val(stData.name);
        $("ageIn").val(stData.age);
        $("mailIn").val(stData.mail);
        $("#edit").modal('show');
      })
      
      </script>
      
       <div class="modal fade" id="edit" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
        <h4 class="modal-title" id="myModalLabel">修改資料</h4>
      </div>
      <div class="modal-body">
        <div>
        <h4>將姓名修改為</h4>
        <input id="nameIn" /> 
        </div>
        <div>
        <h4>將年齡修改為</h4>
        <input id="ageIn" /> 
        </div>
        <div>
        <h4>將電子郵件修改為</h4>
        <input id="mailIn" />
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" data-dismiss="modal">關閉</button>
        <button type="button" class="btn btn-primary">儲存</button>
      </div>
    </div>
  </div>
</div>
    </body>
  </html>
