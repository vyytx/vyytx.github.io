<html>
  <head>
    <title>The database</title>
    <link href="css/bootstrap.css" rel="stylesheet">
    <script src="http://orangeappletw.github.io/JavaScript-Advanced-textbook/database_-_part_1/js/fdb-all.min.js"></script>
    <script src="https://code.jquery.com/jquery-2.1.4.js"></script>
    </head>
  <body>
      <table class="table table-hover">
        <thead> The data base 
            <tr>
                <td>id</td>
                <td>姓名</td>
            </tr>
        </thead>
        <tbody class="TInsert">
          
        </tbody>
    </table>
    
      <script>
      var fdb = new ForerunnerDB();
      var db = fdb.db("the database");
      var random = 0;
      var random1 = 0;
      var i = 0;
      var id = 1;
      mainCollection = db.collection('main');
      function _do (times){ 
        while (i != times){
          random = Math.random();
          random1 = Math.random();
          mainCollection.insert({
            name: random,
            age: random1,
            e_mail: random + "@mail.com"
          });
          $( ".TInsert" ).append( $( "<tr><td>id</td><td>random</td><td>random1</td></tr>" ) );
          i = i + 1;
          id = id + 1;
        }
        i = 0;
      }
      </script>
    </body>
  </html>
